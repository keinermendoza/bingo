{% extends "layout.html" %}

{% block main %}

<form action="/create" method="post" enctype="multipart/form-data">
    <input type="number" name="quantity" id="">
    <input type="file" name="file" id="">

    <input type="submit" value="Create Bingo Deck">
    <input type="hidden" name="url_image_selected" id="url_img_selected" value="">    
</form>
<br>
<div class="row">
{% for img in list_img %}
    <div class="col-lg-4 mb-4 mb-lg-0">
        <img
            src="{{img}}"
            class="w-100 shadow-1-strong rounded mb-4 imagen"
            alt="name"
        />
    </div>
{% endfor %}
</div>
    
        
{% endblock %}

{% block script %}
<script>
    list_img = document.getElementsByClassName("imagen");
    for (var i = 0; i < list_img.length; i++)
    {
        list_img[i].addEventListener("click", function()
        {
            document.getElementById("url_img_selected").value = this.src;
            alert(this.src)
        });
    }
</script>

{% endblock %}
